<div class="register-card">
  <h2 class="card-title">Register New Student</h2>
  <p class="card-subtitle">Create a new student account with an initial outstanding balance.</p>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Student Number <span class="required">*</span></label>
      <input
        type="text"
        [(ngModel)]="studentNumber"
        placeholder="e.g. STU-2024-001"
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label class="form-label">Full Name <span class="required">*</span></label>
      <input
        type="text"
        [(ngModel)]="fullName"
        placeholder="e.g. Chemboli Roy"
        class="form-input"
      />
    </div>
  </div>

  <div class="form-group" style="max-width: 300px;">
    <label class="form-label">Initial Balance (XAF)<span class="required">*</span></label>
    <input
      type="number"
      [(ngModel)]="balance"
      placeholder="e.g. 500000"
      min="1"
      class="form-input"
    />
  </div>

  <button class="submit-btn" (click)="submit()" [disabled]="loading">
    {{ loading ? 'Registering...' : 'Register Student' }}
  </button>

  @if (errorMsg) {
    <div class="alert alert-error">❌ {{ errorMsg }}</div>
  }

  @if (result) {
    <div class="alert alert-success">
      <div class="alert-title">✅ Student Registered Successfully</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">Student ID</div>
          <div class="result-value">{{ result.studentNumber }}</div>
        </div>
        <div class="result-item">
          <div class="result-label">Full Name</div>
          <div class="result-value">{{ result.fullName }}</div>
        </div>
        <div class="result-item">
          <div class="result-label">Balance</div>
          <div class="result-value orange">{{ fmt.cfa(result.balance) }}</div>
        </div>
      </div>
    </div>
  }
</div>
