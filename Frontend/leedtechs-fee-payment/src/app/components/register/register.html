<div style="background:white; border:1px solid #e5e7eb; border-radius:8px; padding:28px 32px;">
  <h2 style="font-size:17px; font-weight:600; margin-bottom:4px;">Register New Student</h2>
  <p style="color:#6b7280; font-size:13px; margin-bottom:20px;">Create a new student account with an initial outstanding balance.</p>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div>
      <label style="font-size:13px; font-weight:500;">Student Number *</label><br/>
      <input
        type="text"
        [(ngModel)]="studentNumber"
        placeholder="e.g. STU-2024-001"
        style="width:100%; padding:10px 14px; margin-top:6px; border:1px solid #e5e7eb; border-radius:6px; font-size:14px; outline:none;"
      />
    </div>
    <div>
      <label style="font-size:13px; font-weight:500;">Full Name *</label><br/>
      <input
        type="text"
        [(ngModel)]="fullName"
        placeholder="e.g. Jean-Paul Mbarga"
        style="width:100%; padding:10px 14px; margin-top:6px; border:1px solid #e5e7eb; border-radius:6px; font-size:14px; outline:none;"
      />
    </div>
  </div>

  <div style="margin-top:16px; max-width:300px;">
    <label style="font-size:13px; font-weight:500;">Initial Balance (XAF) *</label><br/>
    <input
      type="number"
      [(ngModel)]="balance"
      placeholder="e.g. 500000"
      min="1"
      style="width:100%; padding:10px 14px; margin-top:6px; border:1px solid #e5e7eb; border-radius:6px; font-size:14px; outline:none;"
    />
  </div>

  <button
    (click)="submit()"
    [disabled]="loading"
    style="margin-top:20px; padding:10px 22px; background:#e07320; color:white; border:none; border-radius:6px; font-weight:600; font-size:14px; cursor:pointer;">
    {{ loading ? 'Registering...' : 'Register Student' }}
  </button>

  @if (errorMsg) {
    <div style="margin-top:16px; padding:14px; background:#fef2f2; border:1px solid #fecaca; border-radius:6px; color:#dc2626; font-size:13px;">
      ❌ {{ errorMsg }}
    </div>
  }

  @if (result) {
    <div style="margin-top:16px; padding:14px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:6px; color:#16a34a;">
      <div style="font-size:14px; font-weight:600; margin-bottom:12px;">✅ Student Registered Successfully</div>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
        <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; padding:10px 14px;">
          <div style="font-size:11px; text-transform:uppercase; color:#6b7280; margin-bottom:4px;">Student ID</div>
          <div style="font-size:15px; font-weight:600; color:#1a1a2e;">{{ result.studentNumber }}</div>
        </div>
        <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; padding:10px 14px;">
          <div style="font-size:11px; text-transform:uppercase; color:#6b7280; margin-bottom:4px;">Full Name</div>
          <div style="font-size:15px; font-weight:600; color:#1a1a2e;">{{ result.fullName }}</div>
        </div>
        <div style="background:white; border:1px solid #e5e7eb; border-radius:6px; padding:10px 14px;">
          <div style="font-size:11px; text-transform:uppercase; color:#6b7280; margin-bottom:4px;">Balance</div>
          <div style="font-size:15px; font-weight:600; color:#e07320;">{{ fmt.cfa(result.balance) }}</div>
        </div>
      </div>
    </div>
  }
</div>
